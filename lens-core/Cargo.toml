# ARCHITECTURAL INVARIANT: this crate MUST NOT depend on tauri, any windowing/UI
# crate, or platform-specific GUI libraries. It is the pure, headless engine.
[package]
name = "lens-core"
version.workspace = true
edition.workspace = true
description = "LensLM headless engine — pure Rust, no Tauri/windowing/UI dependencies."
# Internal crate, not published to crates.io (no license chosen yet).
publish = false

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
rstest = { workspace = true }
insta = { workspace = true }
# Temp-dir DBs for integration tests that need real on-disk files / concurrency.
tempfile = { workspace = true }
