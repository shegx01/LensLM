# ARCHITECTURAL INVARIANT: this crate MUST NOT depend on tauri, any windowing/UI
# crate, or platform-specific GUI libraries. It is the pure, headless engine.
[package]
name = "lens-core"
version.workspace = true
edition.workspace = true
description = "LensLM headless engine — pure Rust, no Tauri/windowing/UI dependencies."
# Internal crate, not published to crates.io (no license chosen yet).
publish = false

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
# `rt` + `macros` enable `#[tokio::test]`; unioned with the prod `sync` feature
# only during test builds, so the release binary stays lean.
tokio = { workspace = true, features = ["rt", "macros"] }
rstest = { workspace = true }
insta = { workspace = true }
