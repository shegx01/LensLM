name: CI

# Test + lint gate. Runs on every PR and on pushes to main.
# Linux-only by design: cross-platform bundling is verified later at release time,
# not here. Release automation is intentionally out of scope for this workflow.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────── Rust ───────────────────────────
  # The old single `rust` job ran fmt → clippy → test serially, paying the
  # workspace compile twice (clippy + test use different profiles) and running
  # all ~880 tests in one lane. It is now a fan-out DAG that shares one warm
  # cache: fmt / clippy / archive run in parallel, then the test binaries built
  # once by `rust-archive` are downloaded and run across 3 partitioned shards
  # with cargo-nextest (no recompilation in the shards).

  rust-fmt:
    name: Rust (fmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # fmt needs only rustfmt from the pinned toolchain — no system deps, no
      # compile, no cache. Kept as its own tiny job for near-instant feedback.
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Format check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust (clippy)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Gates clippy's compile on rustc warnings too. Scoped to this job so it
      # can't invalidate the frontend/e2e caches.
      RUSTFLAGS: '-D warnings'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
      # Supply-chain gate: fetch the pinned libpdfium dylib and verify its
      # SHA-256 against the committed CHECKSUMS before any build runs. (Runtime
      # loading is macOS-only; on Linux this is purely the integrity check.)
      - name: Fetch + verify pinned libpdfium dylib
        run: scripts/fetch-pdfium.sh --verify
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-archive:
    name: Rust (build + archive tests)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Gates the test-binary compile on rustc warnings (was `cargo test`'s job).
      RUSTFLAGS: '-D warnings'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # The one job that writes the shared cache, so parallel jobs don't race.
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
        with:
          save-cache: 'true'
          install-nextest: 'true'
      - name: Fetch + verify pinned libpdfium dylib
        run: scripts/fetch-pdfium.sh --verify
      # Compile every test binary in the workspace exactly once and pack them
      # (plus the metadata nextest needs) into a self-contained archive.
      - name: Build + archive test binaries
        run: cargo nextest archive --workspace --archive-file target/nextest-archive.tar.zst
      - name: Upload nextest archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: target/nextest-archive.tar.zst
          retention-days: 1

  rust-test:
    name: Rust (test shard ${{ matrix.shard }}/3)
    needs: rust-archive
    runs-on: ubuntu-latest
    strategy:
      # One shard failing shouldn't cancel the others — we want the full picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # No compile here, so skip the cargo cache; we still need the apt runtime
      # libs (to load the binaries) and nextest (to run the archive).
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
        with:
          cache: 'false'
          install-nextest: 'true'
      - name: Download nextest archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
          path: target
      # Run this shard's slice of the suite straight from the prebuilt binaries.
      - name: Run test shard
        run: >-
          cargo nextest run
          --archive-file target/nextest-archive.tar.zst
          --partition count:${{ matrix.shard }}/3

  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend (format + check + unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Svelte type check
        run: bun run check

      - name: Unit + component tests
        run: bun run test

  e2e:
    # Non-blocking: Playwright drives the SvelteKit dev server (not native Tauri),
    # so a failure here is informative but does not gate merges.
    name: E2E (Playwright, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
