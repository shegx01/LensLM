name: CI

# Test + lint gate. Runs on every PR and on pushes to main.
# Linux-only by design: cross-platform bundling is verified later at release time,
# not here. Release automation is intentionally out of scope for this workflow.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    env:
      # Scoped to the Rust job so it can't leak into (or invalidate caches for)
      # the frontend/e2e jobs. Also gates `cargo test`'s compile on rustc warnings.
      CARGO_TERM_COLOR: always
      RUSTFLAGS: '-D warnings'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Tauri v2 needs the WebKitGTK stack to compile src-tauri (and thus the
      # workspace test build, which includes the bridge crate).
      # `protobuf-compiler` (protoc) is required by `lance-encoding` (transitive
      # via lancedb, M4) whose build script compiles .proto files with prost.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            protobuf-compiler \
            curl wget file

      # The toolchain (1.94.1 + clippy + rustfmt) is pinned by rust-toolchain.toml;
      # `rustup show` materializes it so later steps don't pay the install cost mid-run.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # Vendor + verify the pinned libpdfium dylib (M4 Phase 2 PDF extractor).
      # The dylib is gitignored and fetched here; scripts/fetch-pdfium.sh re-runs
      # in --verify mode so the downloaded binary's SHA-256 is checked against the
      # committed src-tauri/frameworks/CHECKSUMS (supply-chain integrity) BEFORE
      # the build/test steps. NOTE: the pinned asset is the macOS universal dylib;
      # on this Linux runner it is fetched + checksum-verified but cannot be loaded
      # at runtime, so the PDF *binding* tests are #[cfg(target_os = "macos")]-gated
      # (verified on macOS dev / release). This step still guards the checksum so a
      # tampered/unpinned binary fails CI regardless of platform.
      - name: Fetch + verify pinned libpdfium dylib
        run: scripts/fetch-pdfium.sh --verify

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend (format + check + unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Svelte type check
        run: bun run check

      - name: Unit + component tests
        run: bun run test

  e2e:
    # Non-blocking: Playwright drives the SvelteKit dev server (not native Tauri),
    # so a failure here is informative but does not gate merges.
    name: E2E (Playwright, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
