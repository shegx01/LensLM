name: CI

# Test + lint gate. Runs on every PR and on pushes to main.
# Linux-only by design: cross-platform bundling is verified later at release time,
# not here. Release automation is intentionally out of scope for this workflow.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Coloured cargo output everywhere; harmless for the non-Rust jobs.
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────── Rust ───────────────────────────
  # The old single `rust` job ran fmt → clippy → test serially in one lane. It
  # is now a fan-out: fmt / clippy / and 3 test shards run in parallel, all
  # sharing one warm cargo cache (deps built once, restored everywhere). Each
  # shard compiles the workspace from the warm cache and runs its slice of the
  # suite via `cargo nextest run --partition` — so the ~3m of test execution is
  # split 3 ways, and fmt/clippy give fast fail-first feedback without waiting
  # behind the test build.
  #
  # Why no prebuilt "archive" hand-off: the nextest archive of this workspace is
  # ~6 GB (debug binaries + stdlib); re-downloading it per shard cost more than
  # recompiling from the warm cache does. Recompile-from-cache is the cheaper
  # seam here.
  #
  # NOTE (required checks): these job display names replace the old
  # "Rust (fmt + clippy + test)" check. Update the branch-protection ruleset to
  # require the new names — see docs/ci.md.

  rust-fmt:
    name: Rust (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # fmt needs only rustfmt from the pinned toolchain — no system deps, no
      # compile, no cache. Kept as its own tiny job for near-instant feedback.
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Format check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust (clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Gates clippy's compile on rustc warnings too. Scoped to this job so it
      # can't invalidate the frontend/e2e caches.
      RUSTFLAGS: '-D warnings'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # Reads the shared cache; the test shards keep it warm (save-if there).
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
        with:
          fetch-pdfium: 'true'
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    # SHARD COUNT lives in two places that MUST stay in sync: the `shard` matrix
    # below and env.SHARD_TOTAL (the nextest partition denominator). The display
    # name shows the shard index only (e.g. "Rust (test/1)").
    name: Rust (test/${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # One shard failing shouldn't cancel the others — we want the full picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      # Gates the test-binary compile on rustc warnings (was `cargo test`'s job).
      RUSTFLAGS: '-D warnings'
      SHARD_TOTAL: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # All shards restore the shared cache; shard 1 is the sole writer so the
      # parallel shards don't race on the same key. Each shard compiles the
      # workspace test binaries from the warm cache (deps already built) and
      # runs its partition.
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
        with:
          save-cache: ${{ matrix.shard == 1 }}
          fetch-pdfium: 'true'
          install-nextest: 'true'
      - name: Run test shard
        run: >-
          cargo nextest run --workspace
          --partition count:${{ matrix.shard }}/${{ env.SHARD_TOTAL }}

  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend (format + check + unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Svelte type check
        run: bun run check

      - name: Unit + component tests
        run: bun run test

  e2e:
    # Non-blocking: Playwright drives the SvelteKit dev server (not native Tauri),
    # so a failure here is informative but does not gate merges.
    name: E2E (Playwright, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
