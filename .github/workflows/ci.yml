name: CI

# Test + lint gate. Runs on every PR and on pushes to main.
# Linux-only by design: cross-platform bundling is verified later at release time,
# not here. Release automation is intentionally out of scope for this workflow.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Coloured cargo output everywhere; harmless for the non-Rust jobs.
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────── Rust ───────────────────────────
  # CI runs fmt + clippy (the Linux compile/lint canary — clippy --all-targets
  # also compiles the test code). The Rust test SUITE runs locally and is gated
  # by a `signoff` commit status (gh-signoff); see docs/ci.md.

  rust-fmt:
    name: Rust (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # fmt needs only rustfmt from the pinned toolchain — no system deps, no
      # compile, no cache. Kept as its own tiny job for near-instant feedback.
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Format check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust (clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Gates clippy's compile on rustc warnings too. Scoped to this job so it
      # can't invalidate the frontend/e2e caches.
      RUSTFLAGS: '-D warnings'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # The only Rust compile job now, so it writes the shared cache.
      - name: Set up Rust environment
        uses: ./.github/actions/rust-env
        with:
          save-cache: 'true'
          fetch-pdfium: 'true'
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend (format + check + unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Svelte type check
        run: bun run check

      - name: Unit + component tests
        run: bun run test

  e2e:
    # Non-blocking: Playwright drives the SvelteKit dev server (not native Tauri),
    # so a failure here is informative but does not gate merges.
    name: E2E (Playwright, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
