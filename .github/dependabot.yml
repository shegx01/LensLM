version: 2
updates:
  # Rust workspace dependencies (root Cargo.toml + member crates).
  - package-ecosystem: cargo
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions used by the CI and Audit workflows.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Frontend JS dependencies (reads package.json; Bun lockfile updates are not
  # yet natively parsed by Dependabot, but manifest version bumps are proposed).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
