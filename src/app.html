<!doctype html>
<html lang="en" data-accent="purple">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- CSP-PINNED SCRIPT: The sha256 hash of this inline script is pinned in
         src-tauri/tauri.conf.json under app.security.csp (script-src).
         If you modify this script, you MUST recompute the hash and update the CSP.
         Recompute command:
           node scripts/verify-csp-hash.mjs
         (It will print the computed hash; update the sha256-... value in tauri.conf.json.)
         Then run `bun run verify:csp` to confirm the hash matches. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mode-watcher-mode');
          if (!t || t === 'system') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.toggle('dark', t === 'dark');
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
